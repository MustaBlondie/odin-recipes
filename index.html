<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/styles.css" />
    <title>Odin Recipes</title>
  </head>
  <body>
    <div class="main-container">
      <div class="title">
        <h1 class="main-title">Odin Recipes</h1>
        <p class="main-p">Everyday Venezuelan comfort food and more...</p>
      </div>

      <div class="links-container">
        <div class="link-recipe-container">
          <img
            src="./images/areas-uno.jpg"
            alt="arepas-imagen"
            class="img-link-recipe"
          />
          <div class="a-container">
            <a href="recipes/arepas.html" rel="noopener noreferrer">Arepas</a>
          </div>
        </div>
        <div class="link-recipe-container">
          <img
            src="./images/chicha.jpg"
            alt="chicha-imagen"
            class="img-link-recipe"
          />
          <div class="a-container">
            <a href="recipes/chicha.html" rel="noopener noreferrer">Chicha</a>
          </div>
        </div>
        <div class="link-recipe-container">
          <img
            src="./images/empanada.jpg"
            alt="empanada-imagen"
            class="img-link-recipe"
          />
          <div class="a-container">
            <a href="recipes/empanada.html" rel="noopener noreferrer"
              >Empanadas
            </a>
          </div>
        </div>
      </div>

      <div class="add-recipe-form">
        <div class="recipe-form-title">
          <h2>
            Add your <br />
            <span class="recipe-form-bigger-title">own recipe</span>
          </h2>
          <p>
            We love Venezuelan food, but we know there are delicious dishes all
            around the world. <br/> Don't be shy — share one with us.
          </p>
        </div>
        <div class="form">
          <form action="" method="post"></form>
        </div>
      </div>
    </div>
  </body>
</html>
